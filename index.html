<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>IDCO · Landings desplegadas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --negro:#0A0A0A; --rojo:#DD1927; --blanco:#FFFFFF;
    --gris:#8A8A8A; --linea:#1E1E1E; --panel:#111111;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--negro);color:var(--blanco);font-family:'DM Sans',sans-serif;min-height:100vh}
  .wrap{max-width:860px;margin:0 auto;padding:56px 24px 80px}

  header{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,96px);line-height:.9;letter-spacing:1px}
  h1 .rojo{background:var(--rojo);color:var(--blanco);padding:0 14px;display:inline-block}
  .sub{color:var(--gris);font-size:15px;margin-top:14px;max-width:520px}

  .barra{display:flex;gap:12px;align-items:center;margin:40px 0 8px;flex-wrap:wrap}
  #buscador{
    flex:1;min-width:220px;background:var(--panel);border:1px solid var(--linea);
    color:var(--blanco);font:inherit;font-size:15px;padding:13px 16px;border-radius:6px;outline:none;
  }
  #buscador:focus{border-color:var(--rojo)}
  #buscador::placeholder{color:var(--gris)}
  .contador{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--gris);white-space:nowrap}
  .contador b{color:var(--blanco);font-weight:400}

  ol{list-style:none;margin-top:16px}
  .deploy a{
    display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--blanco);
    padding:18px 4px;border-bottom:1px solid var(--linea);transition:background .15s,padding-left .15s;
  }
  .deploy a:hover,.deploy a:focus-visible{background:var(--panel);padding-left:14px;outline:none}
  .deploy .nombre{font-size:17px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .deploy .carpeta{color:var(--gris);font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace}
  .deploy .fecha{color:var(--gris);font-size:13px;white-space:nowrap}
  .deploy .flecha{color:var(--rojo);font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}

  #vacio{display:none;padding:48px 4px;color:var(--gris);font-size:15px;border-bottom:1px solid var(--linea)}
  footer{margin-top:56px;color:var(--gris);font-size:12px;letter-spacing:.5px}
  @media (prefers-reduced-motion:reduce){.deploy a{transition:none}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>LANDINGS <span class="rojo">IDCO</span></h1>
  </header>
  <p class="sub">Panel interno · Cada entrada enlaza a la landing desplegada en su subcarpeta. Las nuevas aparecen arriba automáticamente.</p>

  <div class="barra">
    <input id="buscador" type="search" placeholder="Buscar por cliente o carpeta…" aria-label="Buscar landing">
    <span class="contador"><b id="total">0</b> LANDINGS</span>
  </div>

  <ol id="lista">
    <!-- IDCO:NUEVO_DEPLOY -->
    <li class="deploy"><a href="./mar-valera-20260703/"><span class="nombre">Mar Valera</span><span class="carpeta">/mar-valera-20260703/</span><span class="fecha">03/07/2026</span><span class="flecha">&rsaquo;</span></a></li>
    <!--
      PLANTILLA DE ENTRADA (la inserta la automatización justo debajo del marcador de arriba):

      <li class="deploy"><a href="./NOMBRE_CARPETA/"><span class="nombre">NOMBRE CLIENTE</span><span class="carpeta">/NOMBRE_CARPETA/</span><span class="fecha">DD/MM/AAAA</span><span class="flecha">›</span></a></li>
    -->
  </ol>
  <p id="vacio">No hay resultados para esa búsqueda.</p>

  <footer>IDCO · Instituto de Crecimiento Orgánico — Uso interno</footer>
</div>

<script>
(function(){
  const buscador=document.getElementById('buscador');
  const vacio=document.getElementById('vacio');
  const total=document.getElementById('total');
  const items=()=>Array.from(document.querySelectorAll('.deploy'));
  function refrescar(){
    const q=buscador.value.trim().toLowerCase();
    let visibles=0;
    items().forEach(li=>{
      const t=li.textContent.toLowerCase();
      const ok=!q||t.includes(q);
      li.style.display=ok?'':'none';
      if(ok)visibles++;
    });
    total.textContent=items().length;
    vacio.style.display=(visibles===0&&items().length>0)?'block':'none';
  }
  buscador.addEventListener('input',refrescar);
  refrescar();
})();
</script>
</body>
</html>
